<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>雅思口语语义匹配学习工具</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e4e8f0;--brand:#3157d5;--soft:#eef2ff;--answer:#fff8e7;--answer-line:#f0d58a;--ok:#147a50;--warn:#a15c00;--shadow:0 12px 32px rgba(23,32,51,.08)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7f9ff,#f4f8f7);color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.wrap{width:min(1120px,calc(100% - 28px));margin:32px auto 64px}header{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:18px}h1{font-size:clamp(25px,4vw,38px);margin:0 0 6px}.sub{color:var(--muted);margin:0;font-size:14px}.server{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.status{font-size:12px;color:var(--muted)}.status.ok{color:var(--ok)}.status.warn{color:var(--warn)}button,input,select,textarea{font:inherit;border:1px solid var(--line);border-radius:10px;padding:9px 13px;background:var(--card);color:var(--ink)}button{cursor:pointer}button:hover{border-color:#b7c2de;background:#f9faff}button.primary{background:var(--brand);border-color:var(--brand);color:#fff}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.tabs button{font-weight:700}.toolbar{display:flex;flex-wrap:wrap;gap:9px;padding:13px;background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);margin-bottom:13px}.toolbar input{flex:1;min-width:220px}.panel{background:var(--card);border:1px solid var(--line);border-radius:17px;box-shadow:var(--shadow);overflow:hidden}.hidden{display:none!important}.phrase-head,.phrase-row{display:grid;grid-template-columns:48px minmax(220px,1fr) minmax(270px,1.25fr)}.phrase-head{background:#f0f3f9;color:var(--muted);font-size:12px;font-weight:700}.phrase-head div,.phrase-row>div{padding:13px 15px}.phrase-row{border-top:1px solid var(--line);min-height:68px}.number{color:#98a2b3;text-align:center}.answer-wrap{border-left:1px solid var(--line);padding:8px!important}.reveal{width:100%;height:100%;min-height:48px;background:var(--soft);color:var(--brand);font-weight:700}.reveal.open{background:#f1faf6;color:var(--ink);text-align:left}.q-card{padding:16px;border-top:1px solid var(--line);transition:background .2s}.q-card:first-child{border-top:0}.q-card.learned{background:#f4fbf7}.q-card-head{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}.q-card-head>div:first-child{min-width:0}.q-meta{font-size:12px;color:var(--brand);font-weight:700;margin-bottom:6px}.q-text{font-size:16px;font-weight:650;line-height:1.55}.study-check{display:flex;align-items:center;gap:7px;white-space:nowrap;padding:7px 10px;border:1px solid #cfe8da;background:#fff;border-radius:999px;color:var(--ok);font-size:13px;font-weight:700;cursor:pointer}.study-check input{width:17px;height:17px;margin:0;padding:0;accent-color:var(--ok)}.study-progress{color:var(--ok);font-size:13px;font-weight:700;align-self:center;margin-left:auto}.note-box{margin-top:12px;padding:12px;background:#fff8cf;border:1px solid #edda7b;border-radius:12px;box-shadow:0 3px 0 rgba(170,135,0,.08)}.note-title{display:flex;align-items:center;justify-content:space-between;color:#735b00;font-size:13px;font-weight:750;margin-bottom:8px}.note-status{font-size:11px;color:#95844a;font-weight:500}.question-note{display:block;width:100%;min-height:88px;resize:vertical;background:rgba(255,255,255,.66);border-color:#e6d374;line-height:1.55}.question-note:focus{outline:2px solid rgba(49,87,213,.2);border-color:var(--brand)}.match-actions{margin-top:11px;display:flex;gap:8px;align-items:center}.match-note{font-size:12px;color:var(--muted)}.results{margin-top:12px}.match-fold{border:1px solid var(--line);border-radius:11px;background:#fbfcff;padding:0 10px 10px}.match-fold>summary{padding:10px 2px}.rec-list{display:grid;gap:8px}.rec{padding:10px 12px;background:var(--soft);border-radius:10px;line-height:1.45}.rec-en{font-weight:750;color:var(--brand)}.badge{font-size:11px;color:var(--muted);margin-left:7px}.why{font-size:12px;color:var(--muted);margin-top:5px}.why strong{color:var(--ink)}details{margin-top:8px}summary{cursor:pointer;color:var(--brand);font-weight:700;font-size:13px;padding:8px 2px}.loading{color:var(--muted);font-size:13px}.empty{padding:28px;text-align:center;color:var(--muted)}.reference-inline{margin-top:10px}.reference{border:1px solid var(--answer-line);border-radius:12px;background:var(--answer);overflow:hidden}.reference summary{padding:11px 13px;color:#8a5a00;list-style-position:inside}.reference[open] summary{border-bottom:1px solid var(--answer-line)}.reference-body{padding:12px 15px 14px;color:#2f3441;font-size:14px;line-height:1.78}.reference-question{font-weight:750;color:var(--ink);margin-bottom:8px}.reference-body p{margin:0 0 10px}.reference-body p:last-child{margin-bottom:0}.reference-body strong{font-weight:800;color:#1e2430}.answer-card{padding:17px;border-top:1px solid var(--line)}.answer-card:first-child{border-top:0}.answer-card .reference{margin-top:10px}.answer-count{color:var(--muted);font-size:12px;margin-left:auto;align-self:center}
    @media(max-width:720px){.wrap{width:min(100% - 18px,1120px);margin-top:20px}header{align-items:flex-start;flex-direction:column}.server{justify-content:flex-start;width:100%}.server input{min-width:0;flex:1}.tabs button{font-size:13px;padding:9px 5px}.phrase-head{display:none}.phrase-row{grid-template-columns:38px 1fr}.number{grid-row:1/span 2}.answer-wrap{grid-column:2;border-left:0;padding:0 10px 11px!important}.toolbar>*{flex:1}.toolbar input{flex-basis:100%}.q-card-head{flex-direction:column}.study-check{align-self:flex-start}.study-progress{width:100%;margin-left:0}.match-actions{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<main class="wrap">
  <header>
    <div><h1>雅思口语语义匹配学习工具</h1><p class="sub">短语抽背 + 题目表达匹配 + 可折叠标准回答</p></div>
    <div class="server"><input id="apiBase" value="http://127.0.0.1:8000" aria-label="后端地址"><button id="connect">连接</button><span id="status" class="status">尚未连接</span></div>
  </header>
  <nav class="tabs"><button id="phraseTab" class="primary">短语抽背</button><button id="questionTab">题库语义匹配</button><button id="answerTab">标准回答参考</button></nav>

  <section id="phraseView">
    <div class="toolbar">
      <select id="phraseCategory"><option>全部主题</option></select>
      <button id="randomPhrase">随机抽一条</button><button id="shuffle">随机排序</button><button id="showAll">显示全部</button><button id="hideAll">隐藏全部</button>
    </div>
    <div class="panel"><div class="phrase-head"><div>序号</div><div>中文提示</div><div>英文答案</div></div><div id="phraseList"></div></div>
  </section>

  <section id="questionView" class="hidden">
    <div class="toolbar"><select id="part"><option value="P1">Part 1</option><option value="P2">Part 2</option><option value="P3">Part 3</option></select><select id="topic"><option>全部主题</option></select><select id="studyFilter"><option value="全部">全部学习状态</option><option value="未学习">只看未学习</option><option value="已学习">只看已学习</option></select><input id="search" type="search" placeholder="搜索题目或主题……"><span id="studyProgress" class="study-progress"></span></div>
    <div class="panel" id="questionList"></div>
  </section>

  <section id="answerView" class="hidden">
    <div class="toolbar"><select id="answerPart"><option value="全部">全部 Part</option><option value="P1">Part 1</option><option value="P2">Part 2</option><option value="P3">Part 3</option></select><select id="answerTopic"><option>全部主题</option></select><input id="answerSearch" type="search" placeholder="搜索标准回答或题目……"><span id="answerCount" class="answer-count"></span></div>
    <div class="panel" id="answerList"></div>
  </section>
</main>
<script>
  let API=localStorage.getItem('ielts_api_base')||'http://127.0.0.1:8000';
  const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const STUDY_KEY='ielts_studied_questions_v1',NOTE_KEY='ielts_question_notes_v1';
  function readLocal(key){try{const value=JSON.parse(localStorage.getItem(key)||'{}');return value&&typeof value==='object'&&!Array.isArray(value)?value:{}}catch{return {}}}
  function saveLocal(key,value){try{localStorage.setItem(key,JSON.stringify(value));return true}catch{return false}}
  $('#apiBase').value=API;let allPhrases=[],phrases=[],questions=[],staticQuestions=[],allAnswers=[],answers=[],savedMatches={},matchCache=new Map(),backendOnline=false,studiedQuestions=readLocal(STUDY_KEY),questionNotes=readLocal(NOTE_KEY);
  async function request(path,options){const r=await fetch(API+path,options);if(!r.ok)throw new Error((await r.text())||`HTTP ${r.status}`);return r.json()}
  function setStatus(text,type=''){const el=$('#status');el.textContent=text;el.className='status '+type}
  async function loadStaticData(){const [p,q,m,a]=await Promise.all([fetch('data/phrases.json').then(r=>r.json()),fetch('data/questions.json').then(r=>r.json()),fetch('data/matches.json').then(r=>r.json()).catch(()=>({})),fetch('data/answers.json').then(r=>r.json()).catch(()=>([]))]);allPhrases=p.map(x=>({...x,open:false}));staticQuestions=q;allAnswers=Array.isArray(a)?a:[];savedMatches=m&&typeof m==='object'?m:{};matchCache=new Map(Object.entries(savedMatches))}
  async function connect(){API=$('#apiBase').value.trim().replace(/\/$/,'');localStorage.setItem('ielts_api_base',API);setStatus('连接中…');try{await loadStaticData();const h=await request('/api/health');backendOnline=true;setStatus(h.llm_configured?`已连接 · ${h.model} · 大模型已启用`:'已连接 · 可使用已保存结果','ok')}catch(e){backendOnline=false;try{if(!staticQuestions.length)await loadStaticData();setStatus(`离线模式 · ${Object.keys(savedMatches).length} 道匹配 · ${allAnswers.length} 个标准回答`,'ok')}catch(err){setStatus('无法读取离线数据，请通过 start_frontend.bat 启动','warn')}}await loadPhrases();await loadQuestions();loadAnswers()}
  $('#connect').onclick=connect;
  async function loadPhrases(){if(backendOnline){const d=await request('/api/phrases');allPhrases=d.items.map(x=>({...x,open:false}))}const categories=[...new Set(allPhrases.map(x=>x.category))].sort();$('#phraseCategory').innerHTML='<option>全部主题</option>'+categories.map(x=>`<option>${esc(x)}</option>`).join('');filterPhrases()}
  function filterPhrases(){const c=$('#phraseCategory').value;phrases=allPhrases.filter(x=>c==='全部主题'||x.category===c);renderPhrases()}
  function renderPhrases(){const list=$('#phraseList');list.innerHTML=phrases.map((p,i)=>`<div class="phrase-row"><div class="number">${i+1}</div><div>${esc(p.cn)}</div><div class="answer-wrap"><button class="reveal ${p.open?'open':''}" data-id="${p.id}">${p.open?esc(p.en):'点击显示答案'}</button></div></div>`).join('');list.querySelectorAll('.reveal').forEach(b=>b.onclick=()=>{const p=allPhrases.find(x=>x.id===b.dataset.id);p.open=!p.open;renderPhrases()})}
  $('#phraseCategory').onchange=filterPhrases;$('#showAll').onclick=()=>{phrases.forEach(x=>x.open=true);renderPhrases()};$('#hideAll').onclick=()=>{phrases.forEach(x=>x.open=false);renderPhrases()};$('#shuffle').onclick=()=>{phrases.sort(()=>Math.random()-.5);phrases.forEach(x=>x.open=false);renderPhrases()};$('#randomPhrase').onclick=()=>{if(!phrases.length)return;const p=phrases[Math.floor(Math.random()*phrases.length)];phrases=[p,...phrases.filter(x=>x!==p)];phrases.forEach(x=>x.open=false);renderPhrases()};
  function updateStudyProgress(){const part=$('#part').value,items=staticQuestions.filter(q=>q.part===part),done=items.filter(q=>studiedQuestions[q.id]).length;$('#studyProgress').textContent=`已学习 ${done}/${items.length}`}
  async function loadQuestions(){const part=$('#part').value,topic=$('#topic').value||'全部主题',search=$('#search').value.trim(),studyFilter=$('#studyFilter').value;let items,topics;if(backendOnline){const params=new URLSearchParams({part});if(topic!=='全部主题')params.set('topic',topic);if(search)params.set('search',search);const d=await request('/api/questions?'+params);items=d.items;topics=d.topics}else{const base=staticQuestions.filter(q=>q.part===part);topics=[...new Set(base.map(q=>q.topic))];items=base.filter(q=>(topic==='全部主题'||q.topic===topic)&&(!search||`${q.topic} ${q.text}`.toLowerCase().includes(search.toLowerCase())))}if(studyFilter!=='全部')items=items.filter(q=>studyFilter==='已学习'?!!studiedQuestions[q.id]:!studiedQuestions[q.id]);questions=items;if(topic==='全部主题'||![...$('#topic').options].some(x=>x.value===topic))$('#topic').innerHTML='<option>全部主题</option>'+topics.map(x=>`<option>${esc(x)}</option>`).join('');updateStudyProgress();renderQuestions()}
  function resultHtml(data){const rec=x=>`<div class="rec"><span class="rec-en">${esc(x.en)}</span><span class="badge">${esc(x.category)}</span><div>${esc(x.cn)}</div><div class="why"><strong>为什么适合：</strong>${esc(x.reason||'与题目语义相关')}<br><strong>使用建议：</strong>${esc(x.use_case||'可用于组织回答')}</div></div>`,items=Array.isArray(data.matches)?data.matches:[],saved=String(data.source||'').includes('llm');return `<div class="match-note">${saved?`已保存的大模型语义匹配 · ${esc(data.model||'大模型')}`:'本地降级匹配'}</div><details class="match-fold"><summary>展开匹配短语（${items.length} 条）</summary><div class="rec-list">${items.map(rec).join('')}</div></details>`}
  function highlight(text,phrases=[]){const keys=[...phrases].filter(Boolean).sort((a,b)=>b.length-a.length);if(!keys.length)return esc(text);const re=new RegExp('('+keys.map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi'),lookup=new Set(keys.map(x=>x.toLowerCase()));return String(text).split(re).map(x=>lookup.has(x.toLowerCase())?`<strong>${esc(x)}</strong>`:esc(x)).join('')}
  function referenceDetails(a,label='展开标准回答参考',showQuestion=true){const paragraphs=(a.paragraphs||[]).map(p=>`<p>${highlight(p,a.key_phrases||[])}</p>`).join('');return `<details class="reference"><summary>${esc(label)}</summary><div class="reference-body">${showQuestion?`<div class="reference-question">${esc(a.question)}</div>`:''}${paragraphs}</div></details>`}
  function linkedAnswers(questionId){return allAnswers.filter(a=>(a.linked_question_ids||[]).includes(questionId))}
  function renderQuestions(){
    const list=$('#questionList');
    if(!questions.length){list.innerHTML='<div class="empty">没有找到题目</div>';return}
    list.innerHTML=questions.map(q=>{
      const hasSaved=matchCache.has(q.id),refs=linkedAnswers(q.id),learned=!!studiedQuestions[q.id],note=questionNotes[q.id]||'';
      return `<article class="q-card ${learned?'learned':''}" data-qid="${esc(q.id)}"><div class="q-card-head"><div><div class="q-meta">${esc(q.part.replace('P','Part '))} · ${esc(q.topic)}</div><div class="q-text">${esc(q.text)}</div></div><label class="study-check"><input type="checkbox" class="studied-toggle" ${learned?'checked':''}> 已学习</label></div>${refs.length?`<div class="reference-inline">${refs.map((a,i)=>referenceDetails(a,refs.length>1?`展开标准回答参考 ${i+1}/${refs.length}`:'展开标准回答参考')).join('')}</div>`:''}<div class="note-box"><div class="note-title"><span>📝 我的便利贴</span><span class="note-status">${note?'已保存':'自动保存'}</span></div><textarea class="question-note" placeholder="记录回答思路、个人例子或下次要复习的内容……">${esc(note)}</textarea></div><div class="match-actions"><button class="primary match" ${!backendOnline&&!hasSaved?'disabled':''}>${hasSaved?'查看已保存匹配':backendOnline?'让大模型匹配并保存':'暂无离线匹配结果'}</button><span class="match-note">${hasSaved?'结果已保存在本地，短语默认折叠':'每次最多推荐 12 条'}</span></div><div class="results">${hasSaved?resultHtml(matchCache.get(q.id)):''}</div></article>`
    }).join('');
    list.querySelectorAll('.studied-toggle').forEach(input=>input.onchange=()=>{const card=input.closest('.q-card'),id=card.dataset.qid;if(input.checked)studiedQuestions[id]=true;else delete studiedQuestions[id];saveLocal(STUDY_KEY,studiedQuestions);card.classList.toggle('learned',input.checked);updateStudyProgress();if($('#studyFilter').value!=='全部')loadQuestions()});
    list.querySelectorAll('.question-note').forEach(input=>{let noteTimer;input.oninput=()=>{const card=input.closest('.q-card'),id=card.dataset.qid,status=card.querySelector('.note-status');status.textContent='保存中…';clearTimeout(noteTimer);noteTimer=setTimeout(()=>{const value=input.value.trimEnd();if(value)questionNotes[id]=value;else delete questionNotes[id];status.textContent=saveLocal(NOTE_KEY,questionNotes)?'已保存':'保存失败';},250)}});
    list.querySelectorAll('.match').forEach(btn=>btn.onclick=async()=>{const card=btn.closest('.q-card'),id=card.dataset.qid,out=card.querySelector('.results');if(matchCache.has(id)){out.innerHTML=resultHtml(matchCache.get(id));return}btn.disabled=true;out.innerHTML='<div class="loading">正在理解题意、匹配并保存结果…</div>';try{const data=await request('/api/match',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question_id:id,limit:12})});matchCache.set(id,data);savedMatches[id]=data;out.innerHTML=resultHtml(data);btn.textContent='查看已保存匹配'}catch(e){out.innerHTML=`<div class="match-note">匹配失败：${esc(e.message)}</div>`}finally{btn.disabled=false}})
  }
  $('#part').onchange=()=>{$('#topic').innerHTML='<option>全部主题</option>';loadQuestions()};$('#topic').onchange=loadQuestions;$('#studyFilter').onchange=loadQuestions;let timer;$('#search').oninput=()=>{clearTimeout(timer);timer=setTimeout(loadQuestions,250)};
  function loadAnswers(){const part=$('#answerPart').value,selectedTopic=$('#answerTopic').value||'全部主题',search=$('#answerSearch').value.trim().toLowerCase(),base=allAnswers.filter(a=>part==='全部'||a.part===part),topics=[...new Set(base.map(a=>a.topic))].sort();if(selectedTopic==='全部主题'||!topics.includes(selectedTopic))$('#answerTopic').innerHTML='<option>全部主题</option>'+topics.map(x=>`<option>${esc(x)}</option>`).join('');const topic=$('#answerTopic').value||'全部主题';answers=base.filter(a=>(topic==='全部主题'||a.topic===topic)&&(!search||`${a.topic} ${a.question} ${(a.paragraphs||[]).join(' ')}`.toLowerCase().includes(search)));renderAnswers()}
  function renderAnswers(){const list=$('#answerList');$('#answerCount').textContent=`${answers.length} / ${allAnswers.length} 个回答`;if(!answers.length){list.innerHTML='<div class="empty">没有找到标准回答</div>';return}list.innerHTML=answers.map(a=>`<article class="answer-card"><div class="q-meta">${esc(a.part.replace('P','Part '))} · ${esc(a.topic)}</div><div class="q-text">${esc(a.question)}</div>${referenceDetails(a,'展开标准回答',false)}</article>`).join('')}
  $('#answerPart').onchange=()=>{$('#answerTopic').innerHTML='<option>全部主题</option>';loadAnswers()};$('#answerTopic').onchange=loadAnswers;let answerTimer;$('#answerSearch').oninput=()=>{clearTimeout(answerTimer);answerTimer=setTimeout(loadAnswers,250)};
  function tab(which){for(const name of ['phrase','question','answer']){$('#'+name+'View').classList.toggle('hidden',name!==which);$('#'+name+'Tab').classList.toggle('primary',name===which)}}
  $('#phraseTab').onclick=()=>tab('phrase');$('#questionTab').onclick=()=>tab('question');$('#answerTab').onclick=()=>tab('answer');connect();
</script>
</body>
</html>
